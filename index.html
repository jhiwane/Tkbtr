<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Guru TK - Sistem Terpadu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); width: 100%; max-width: 400px; overflow: hidden; transition: all 0.4s ease; }
        .fade-enter { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .input-login { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 14px; font-weight: 600; outline: none; transition: 0.3s; }
        .input-login:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .menu-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 16px 20px; margin-bottom: 12px; background: white; border: 2px solid #e2e8f0; border-radius: 16px; font-weight: 700; color: #1e293b; text-decoration: none; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .menu-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-color: #4f46e5; }
        .icon-box { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 12px; }
    </style>
</head>
<body>

    <!-- ================= HALAMAN LOGIN ================= -->
    <div id="login-view" class="glass-panel p-8 fade-enter">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-600/30 transform rotate-3">
                <svg class="w-10 h-10 text-white transform -rotate-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </div>
            <h1 class="text-2xl font-extrabold text-gray-800 tracking-tight">Portal Sekolah</h1>
            <p class="text-gray-500 text-sm mt-1 font-medium">Sistem diamankan dengan Enkripsi Vercel.</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1 ml-1 uppercase tracking-wide">Alamat Email</label>
                <input type="email" id="email-input" placeholder="Masukkan email admin" required class="input-login">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1 ml-1 uppercase tracking-wide">Kata Sandi / PIN</label>
                <input type="password" id="pass-input" placeholder="••••••••" required class="input-login">
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl mt-4 transition-colors shadow-md flex justify-center items-center gap-2">
                <span id="btn-text">Verifikasi & Masuk</span>
            </button>
        </form>
        <div id="error-msg" class="bg-red-50 border border-red-200 text-red-600 text-xs font-bold text-center p-3 rounded-lg mt-4 hidden"></div>
    </div>

    <!-- ================= HALAMAN MENU ================= -->
    <div id="menu-view" class="glass-panel fade-enter hidden">
        <div class="bg-gray-50 p-6 border-b border-gray-100 text-center relative">
            <button onclick="logout()" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition-colors p-1" title="Keluar">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
            <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-3 border-2 border-indigo-200">
                <svg class="w-8 h-8 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </div>
            <h2 class="text-lg font-extrabold text-gray-800" id="user-display-name">Selamat Datang!</h2>
            <p class="text-xs text-gray-500 font-medium" id="user-display-jabatan">Akses Aman Terverifikasi</p>
            <span class="inline-block mt-2 bg-green-100 text-green-700 text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider border border-green-200">Koneksi Aman</span>
        </div>

        <div class="p-6">
            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 ml-1">Layanan Terpadu</p>
            <a href="absensi.html" class="menu-btn group">
                <div class="flex items-center gap-3">
                    <div class="icon-box bg-blue-50 text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div class="text-left"><div class="font-bold text-gray-800 group-hover:text-blue-600 transition-colors">Absensi Guru</div><div class="text-[10px] text-gray-400 font-medium">Sistem hadir & pulang real-time</div></div>
                </div>
            </a>
            <a href="raport.html" class="menu-btn group">
                <div class="flex items-center gap-3">
                    <div class="icon-box bg-green-50 text-green-600 group-hover:bg-green-600 group-hover:text-white transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    </div>
                    <div class="text-left"><div class="font-bold text-gray-800 group-hover:text-green-600 transition-colors">Generator Raport</div><div class="text-[10px] text-gray-400 font-medium">Buat narasi rapor otomatis</div></div>
                </div>
            </a>
            <a href="ijazah.html" class="menu-btn group">
                <div class="flex items-center gap-3">
                    <div class="icon-box bg-yellow-50 text-yellow-600 group-hover:bg-yellow-500 group-hover:text-white transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path></svg>
                    </div>
                    <div class="text-left"><div class="font-bold text-gray-800 group-hover:text-yellow-600 transition-colors">Cetak Ijazah TK</div><div class="text-[10px] text-gray-400 font-medium">Desain premium & elegan</div></div>
                </div>
            </a>
        </div>
    </div>

    <script>
        const SESSION_KEY = 'PortalTK_Secure_Session';

        window.onload = () => { checkSession(); };

        function checkSession() {
            const savedUserStr = localStorage.getItem(SESSION_KEY);
            const loginView = document.getElementById('login-view');
            const menuView = document.getElementById('menu-view');

            if (savedUserStr) {
                const user = JSON.parse(savedUserStr);
                document.getElementById('user-display-name').innerText = `Halo, ${user.nama}!`;
                loginView.classList.add('hidden');
                menuView.classList.remove('hidden');
            } else {
                loginView.classList.remove('hidden');
                menuView.classList.add('hidden');
            }
        }

        // PENGIRIMAN DATA KE VERCEL API (AMAN)
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const emailInput = document.getElementById('email-input').value;
            const passInput = document.getElementById('pass-input').value;
            const errorMsg = document.getElementById('error-msg');
            const btnText = document.getElementById('btn-text');
            
            errorMsg.classList.add('hidden');
            btnText.innerHTML = "Memeriksa ke Server...";

            try {
                // Mengetuk pintu server belakang (api/login.js)
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailInput, pin: passInput })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Berhasil masuk
                    localStorage.setItem(SESSION_KEY, JSON.stringify(data.user));
                    checkSession();
                } else {
                    // Ditolak
                    errorMsg.innerText = data.message || "Akses Ditolak!";
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.innerText = "Tidak dapat terhubung ke server Vercel.";
                errorMsg.classList.remove('hidden');
            } finally {
                btnText.innerHTML = "Verifikasi & Masuk";
            }
        });

        function logout() {
            if(confirm("Keluar dari portal aman?")) {
                localStorage.removeItem(SESSION_KEY);
                document.getElementById('email-input').value = '';
                document.getElementById('pass-input').value = '';
                checkSession();
            }
        }
    </script>
</body>
</html>
